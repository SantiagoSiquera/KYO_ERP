<div class="modal-header">
<h5 class="modal-title">Nuevo movimiento</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<form method="post" action="/movimientos/nuevo/">
{% csrf_token %}

<input type="hidden" name="cuenta" value="{{ cuenta.id }}">
<input type="hidden" name="moneda" value="{{ cuenta.moneda }}">

<div class="modal-body">

<div class="row g-3 mb-3">

<div class="col-md-3">
<label class="form-label">Fecha</label>
{{ form.fecha }}
</div>

<div class="col-md-3">
<label class="form-label">Tipo</label>

<select name="tipo_movimiento" id="tipoMovimiento" class="form-select">
<option value="INGRESO">Ingreso</option>
<option value="EGRESO">Egreso</option>
</select>

</div>

<div class="col-md-3">
<label class="form-label">Monto</label>
{{ form.monto }}
</div>

<div class="col-md-3">
<label class="form-label">Estado</label>
{{ form.estado }}
</div>

</div>

<div class="row mb-3">

<div class="col-md-12">
<label class="form-label">Descripción</label>
{{ form.descripcion }}
</div>

</div>

<hr>

<div class="d-flex justify-content-between align-items-center mb-2">
<h6 class="mb-0">Imputación por rubros</h6>

<button
type="button"
class="btn btn-outline-primary btn-sm"
onclick="agregarRubro()">

<i class="bi bi-plus"></i> Agregar rubro

</button>

</div>

<table class="table table-sm table-bordered align-middle" id="tablaRubros">

<thead class="table-light">
<tr>
<th style="width:35%">Rubro</th>
<th style="width:35%">Proveedor</th>
<th style="width:20%">Importe</th>
<th style="width:10%"></th>
</tr>
</thead>

<tbody
id="rubrosBody"
data-rubros-options="{% for r in rubros %}<option value='{{ r.id }}' data-nombre='{{ r.nombre|lower }}'>{{ r.nombre }}</option>{% endfor %}"
data-proveedores-options="{% for p in proveedores %}<option value='{{ p.id }}'>{{ p.nombre }}</option>{% endfor %}">
</tbody>

</table>

<div class="text-end mt-2">

<div>Total rubros: <b id="totalRubros">0,00</b></div>
<div>Diferencia: <b id="diferenciaRubros">0,00</b></div>

</div>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancelar

</button>

<button
type="submit"
class="btn btn-primary"
id="btnGuardarMovimiento">
Guardar movimiento
</button>

</div>

</form>

<div class="modal fade" id="modalErrorRubros" tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header bg-danger text-white">
<h5 class="modal-title">Movimiento no balanceado</h5>
<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">

<p class="mb-2">
La suma de los rubros debe ser igual al monto del movimiento.
</p>

<p class="fw-bold" id="detalleErrorRubros"></p>

</div>

<div class="modal-footer justify-content-center">
<button class="btn btn-danger" data-bs-dismiss="modal">
Corregir
</button>
</div>

</div>
</div>
</div>
