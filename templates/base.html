{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>KYO ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style> 

body{
background:#F4F6F9;
font-family: "Segoe UI", sans-serif;
}

/* HEADER */

.header{
height:55px;
background:#1E3A5F;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.header img{
height:38px;
width:auto;
border-radius:50%;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:calc(100vh - 55px);
background:#1F2A40;
color:white;
position:fixed;
top:55px;
left:0;
}

.sidebar a{
color:#d1d5db;
text-decoration:none;
display:block;
padding:10px 18px;
font-size:14px;
}

.sidebar a:hover{
background:#2D3E5E;
color:white;
}

.sidebar .section{
font-size:11px;
color:#9ca3af;
margin-top:18px;
margin-left:18px;
text-transform:uppercase;
letter-spacing:1px;
}

/* CONTENT */

.content{
margin-left:230px;
padding:25px;
}

/* CARDS */

.card{
border:none;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card h5{
font-weight:600;
}

.breadcrumb{
background:white;
border-radius:6px;
padding:10px 15px;
font-size:14px;
}

/* Tarjetas Banco */

.cuenta-card{
cursor:pointer;
transition:all 0.18s ease;
border:1px solid transparent;
}

.cuenta-card:hover{
transform:translateY(-3px);
box-shadow:0 6px 14px rgba(0,0,0,0.12);
background:#eef4ff;
border-color:#d6e2ff;
}

/* TABLAS */

.tabla-movimientos td,
.tabla-movimientos th{
vertical-align:middle;
padding:8px 10px;
}

.tabla-movimientos th{
text-align:center;
white-space:nowrap;
}

.tabla-movimientos td{
background:#fff;
}

.col-monto{
text-align:right;
font-weight:600;
}

.estado-select{
width:120px;
}

.acciones-box{
display:flex;
gap:6px;
justify-content:center;
align-items:center;
}

/* MODAL RUBROS */

.modal-body .table{
margin-bottom:10px;
}

#tablaRubros th{
font-size:13px;
}

#tablaRubros td{
padding:6px;
}

#tablaRubros select,
#tablaRubros input{
height:34px;
}

</style>

{% block extra_css %}
{% endblock %}

</head>

<body>

<div class="header">

<div style="display:flex;align-items:center;gap:10px">

<button class="btn btn-dark btn-sm" onclick="toggleSidebar()">
<i class="bi bi-list"></i>
</button>

<a href="/">
<img src="{% static 'img/logo_kyo.png' %}">
</a>

<b style="font-size:18px">KYO ERP</b>

</div>

<div>
Usuario: {{ request.user }}
</div>

</div>

<div class="sidebar" id="sidebar">

<a href="/">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<div class="section">BANCO</div>

<a href="/banco">
<i class="bi bi-bank"></i> Banco
</a>

<a href="/movimientos/conciliacion">
<i class="bi bi-arrow-left-right"></i> Conciliación
</a>

<a href="#">
<i class="bi bi-graph-up"></i> Resultados
</a>

<div class="section">VENTAS</div>

<a href="#">
<i class="bi bi-file-earmark-text"></i> Presupuestos
</a>

<a href="#">
<i class="bi bi-receipt"></i> Pedidos
</a>

<div class="section">CONFIGURACIÓN</div>

<a href="#">
<i class="bi bi-people"></i> Usuarios
</a>

<a href="#">
<i class="bi bi-shield-lock"></i> Seguridad
</a>

</div>

<div class="content" id="content">

{% block content %}
{% endblock %}

</div>

<script>

function toggleSidebar(){

let sidebar = document.getElementById("sidebar")
let content = document.getElementById("content")

sidebar.classList.toggle("collapsed")
content.classList.toggle("expanded")

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


{% block extra_js %}
<script src="{% static 'banco/banco.js' %}"></script>
{% endblock %}

</body>
</html>
